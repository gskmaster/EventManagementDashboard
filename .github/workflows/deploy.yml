name: Deploy to Cloud Run on push

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0764930804
  REGION: us-west1
  SERVICE_NAME: event-management-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}" \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID="${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" \
            --build-arg VITE_FIREBASE_FIRESTORE_DATABASE_ID="${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}" \
            --build-arg VITE_RECAPTCHA_SITE_KEY="${{ secrets.VITE_RECAPTCHA_SITE_KEY }}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" \
            --build-arg VITE_FIREBASE_REGION="${{ secrets.VITE_FIREBASE_REGION || 'asia-southeast2' }}" \
            --build-arg VITE_CONSENT_FUNCTION_URL="${{ secrets.VITE_CONSENT_FUNCTION_URL }}" \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy Firebase Functions
        run: |
          npm install -g firebase-tools
          cd functions && npm install
          firebase deploy --only functions --non-interactive --project ${{ env.PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}" --force

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.101.208.207
          username: github_action
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            sudo gcloud auth configure-docker --quiet
            sudo docker pull gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            sudo docker stop ${{ env.SERVICE_NAME }} || true
            sudo docker rm ${{ env.SERVICE_NAME }} || true
            sudo docker run -d --name ${{ env.SERVICE_NAME }} --restart always -p 8080:8080 gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            sudo apt-get install -y nginx certbot python3-certbot-nginx
            sudo tee /etc/nginx/sites-available/default > /dev/null <<'EOF'
            server {
                listen 80;
                server_name eveniser.gsk.co.id;
                location / {
                    proxy_pass http://localhost:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
            }
            EOF
            sudo systemctl restart nginx
            sudo certbot --nginx -d eveniser.gsk.co.id --non-interactive --agree-tos -m admin@gsk.co.id --keep-until-expiring
